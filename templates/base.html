<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}فارم های ماینکرفت{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">فارم ها و نمره هایشان</a>
            <ul class="nav-menu">
                <li><a href="/">خانه</a></li>
                <li><a href="/makefarm">جدول مقایسه ی فارم ها</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>ساخته شد توسط <strong>امیرعلی جواهری</strong></p>
        <p>امروز: <span id="today-date">--</span></p>
    </footer>
    
    <button onclick="topFunction()" id="backToTopBtn" title="برو به بالا">⬆️</button>

    <script src="/static/script.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
